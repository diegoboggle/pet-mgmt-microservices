# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
# Usamos el 8081 para que no choque con Mascotas (8080)
server.port=8081
spring.application.name=ms-usuario

# ===============================
# CONFIGURACIÓN DE LARAGON / MYSQL
# ===============================
# Asegúrate de crear la base de datos 'db_usuarios' en HeidiSQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuario
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Crea y actualiza las tablas automáticamente leyendo tu modelo Usuario
spring.jpa.hibernate.ddl-auto=update

# Muestra en consola las consultas SQL (opcional, pero muy útil)
spring.jpa.show-sql=true