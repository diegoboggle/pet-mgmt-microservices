server.port=8082

spring.application.name=ms-usuario

spring.datasource.url=jdbc:postgresql://localhost:5432/db_usuarios
spring.datasource.username=postgres
spring.datasource.password=admin12
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de JPA / Hibernate
# 'update' creará las tablas automáticamente en Postgres si no existen
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola las consultas SQL que Spring hace por debajo (súper útil para el profe)
spring.jpa.show-sql=true

# Le dice a Hibernate cómo hablar el "idioma" específico de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect