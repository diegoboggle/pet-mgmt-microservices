server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_mascotas # Cambia el nombre de la BD si es otra
    username: postgres
    password: admin12
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true