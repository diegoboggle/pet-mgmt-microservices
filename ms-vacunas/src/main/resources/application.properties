server.port=8087
spring.application.name=ms-vacunas

# Cambia usuario y contraseña por los de tu MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_vacunas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
